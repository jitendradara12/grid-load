name: Lightweight Daily Kaggle Update

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests kaggle

      - name: Curl Required Files
        run: |
          curl -O https://raw.githubusercontent.com/jitendradara12/grid-load/master/scripts/fetch_yesterday.py
          curl -O https://raw.githubusercontent.com/jitendradara12/grid-load/master/data/dataset-metadata.json
      - name: Configure Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          
          # 1. Determine username (use secret, fallback to hardcoded jitendradara12)
          USERNAME="${{ secrets.KAGGLE_USERNAME }}"
          if [ -z "$USERNAME" ]; then
            USERNAME="jitendradara12"
          fi
          
          # 2. Write kaggle.json (always needed by the CLI to retrieve the username)
          echo "{\"username\":\"$USERNAME\",\"key\":\"${{ secrets.KAGGLE_KEY }}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
          # 3. Write access_token if KAGGLE_API_TOKEN is provided
          if [ -n "${{ secrets.KAGGLE_API_TOKEN }}" ]; then
            printf '%s' '${{ secrets.KAGGLE_API_TOKEN }}' > ~/.kaggle/access_token
            chmod 600 ~/.kaggle/access_token
          fi

      - name: Download and Unzip Kaggle Dataset
        run: |
          kaggle datasets download -d jitendradara12/demand-met-from-sep25 --unzip

      - name: Run Scraper
        run: python fetch_yesterday.py

      - name: Push Updated Data to Kaggle
        run: |
          kaggle datasets version -p . -m "Automated daily update for $(date +'%Y-%m-%d')"
