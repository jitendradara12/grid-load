name: Daily Kaggle Update plus prediction

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Dependencies
        run: uv sync

      - name: Download and Unzip Kaggle Dataset in /data
        run: uv run kaggle datasets download -d jitendradara12/demand-met-from-sep25 --unzip -p data

      - name: Run Scraper
        run: uv run python scripts/fetch_yesterday.py

      - name: Clean Dataset
        run: uv run python scripts/clean_datasets.py npp

      - name: Run Inference
        run: uv run python main.py predict
      # - name: Clean directory
      #   run: rm fetch_yesterday.py

      - name: Commit and Push Predictions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/predictions/latest.json
          git commit -m "chore: update predictions [skip ci]" || echo "No changes to commit"
          git push

      - name: Push Updated Data to Kaggle
        run: uv run kaggle datasets version -p data -m "Automated daily update for $(date +'%Y-%m-%d')"
